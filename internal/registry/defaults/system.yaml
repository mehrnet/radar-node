name: system
action: system_stats
response:
  - name: cpu_percent
    type: number
    unit: "%"
    summary: true
    group: cpu
    display: gauge
  - name: mem_used_percent
    type: number
    unit: "%"
    primary: true
    summary: true
    group: memory
    display: gauge
  - name: mem_total_bytes
    type: number
    unit: bytes
    group: memory
  - name: mem_available_bytes
    type: number
    unit: bytes
    group: memory
  - name: disk_used_percent
    type: number
    unit: "%"
    group: disk
    display: gauge
  - name: disk_total_bytes
    type: number
    unit: bytes
    group: disk
  - name: disk_free_bytes
    type: number
    unit: bytes
    group: disk
  - name: net_in_mbps
    type: number
    unit: mbps
    summary: true
    group: network
  - name: net_out_mbps
    type: number
    unit: mbps
    summary: true
    group: network
  - name: uptime_seconds
    type: number
    unit: s
    group: system
    display: stat
