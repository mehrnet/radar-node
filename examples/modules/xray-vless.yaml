name: xray-vless
engine: xray
engine_version: "26.3.27"
prepare:
  # Deployed alongside this file, e.g. /etc/radar-node/modules.d/prepare-vless.sh
  command: ["/bin/sh", "/etc/radar-node/modules.d/prepare-vless.sh", "{{params_json}}", "{{alloc_port}}"]
run:
  command: ["curl", "--silent", "--max-time", "5",
            "--socks5-hostname", "127.0.0.1:{{alloc_port}}",
            "-o", "/dev/null",
            "-w", "{\"latency_ms\": %{time_total}, \"http_code\": %{http_code}}",
            "{{target}}"]
collect:
  format: writeout_json
