version: 2

before:
  hooks:
    - go mod tidy

builds:
  # internal/checks/system used to read /proc and call syscall.Statfs
  # directly, which only exists on Linux -- that's what broke the
  # v0.1 release build for windows_amd64 (syscall.Statfs_t undefined)
  # and would have crashed at runtime on darwin (no /proc). It's since
  # been rewritten on top of gopsutil, which abstracts each OS's real
  # stats source (Linux /proc, macOS sysctl/host_statistics, Windows
  # perf counters/WMI) behind one cgo-free API, so the same code now
  # genuinely builds and runs correctly on all three. Makefile's
  # `cross` target build-tests this exact matrix before a tag is ever
  # pushed.
  - id: radar-node
    main: ./cmd/radar-node
    binary: radar-node
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: radar-node
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"

release:
  github:
    owner: mehrnet
    name: radar-node
