version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Linux only, matching Makefile's own `cross` target (and, more
  # fundamentally, internal/checks/system: it reads /proc/loadavg,
  # /proc/meminfo, /proc/uptime, and syscall.Statfs, none of which
  # exist on Darwin or Windows). darwin/windows used to be listed here
  # too but were never actually valid -- nothing ever build-tested
  # them until a real release build did, which is exactly how this
  # got caught: syscall.Statfs/Statfs_t don't exist in Windows's
  # syscall package at all, so a windows_amd64 build fails outright,
  # and even a hypothetical darwin build would compile but crash at
  # runtime the moment a "system" job actually ran, since /proc
  # doesn't exist there either. Nodes are Linux boxes; this matches
  # that reality instead of a boilerplate default nobody had verified.
  - id: radar-node
    main: ./cmd/radar-node
    binary: radar-node
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: radar-node
    formats: [tar.gz]
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"

release:
  github:
    owner: mehrnet
    name: radar-node
