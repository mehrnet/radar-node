name: xray
request:
  - name: config
    type: object
    required: true
  - name: socks_port
    type: number
    required: true
prepare:
  command: ["/bin/sh", "__MODULES_DIR__/xray-prepare.sh", "{{params_json}}", "{{alloc_port}}"]
run:
  command: ["/bin/sh", "__MODULES_DIR__/xray-run.sh", "{{alloc_port}}", "{{target}}"]
collect:
  format: writeout_json
response:
  - name: latency_ms
    type: number
  - name: http_code
    type: number
