name: openvpn
version: "2.7.5-1"
url: https://radar.mehrnet.com/install/modules/openvpn.yaml
os: [linux]
arch: [amd64, arm64]
install:
  - name: openvpn
    kind: binary
    version: "2.7.5-1"
    url: https://radar.mehrnet.com/releases/openvpn/openvpn_latest_{os}_{arch}.{ext}
    path: __TOOLS_DIR__/openvpn
  - name: openvpn-test.sh
    kind: file
    url: https://radar.mehrnet.com/install/modules/openvpn-test.sh
    path: __MODULES_DIR__/openvpn-test.sh
request:
  - name: config
    type: string
    required: true
  - name: auth_user
    type: string
  - name: auth_pass
    type: string
run:
  command: ["/bin/sh", "__MODULES_DIR__/openvpn-test.sh", "{{params_json}}", "{{target}}", "{{timeout_ms}}"]
collect:
  format: writeout_json
response:
  - name: latency_ms
    type: number
  - name: http_code
    type: number
