name: openvpn
version: "2.7.5-1"
url: https://radar.mehrnet.com/install/modules/openvpn.yaml
request:
  - name: config
    type: string
    required: true
  - name: auth_user
    type: string
  - name: auth_pass
    type: string
run:
  command: ["/bin/sh", "__MODULES_DIR__/openvpn-test.sh", "{{params_json}}", "{{target}}", "{{timeout_ms}}"]
collect:
  format: writeout_json
response:
  - name: latency_ms
    type: number
  - name: http_code
    type: number
